<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="整備記録" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>整備記録</title>
  <style>
    :root{
      --bg:#f3f4f6;--card:#fff;--text:#111827;--muted:#6b7280;--main:#111827;
      --border:#e5e7eb;--danger:#b91c1c;--soft:#f9fafb;--blue:#2563eb;
      --blue-soft:#eff6ff;--green:#166534;--green-soft:#dcfce7;
      --warn:#92400e;--warn-soft:#fef3c7;--danger-soft:#fee2e2;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom);max-width:820px;margin-inline:auto}
    .topbar{position:sticky;top:0;z-index:20;background:rgba(243,244,246,.94);backdrop-filter:blur(14px);padding:10px 0 8px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:8px}
    .icon-btn{width:44px;height:44px;border:0;border-radius:14px;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.06);font-size:24px;font-weight:800;color:var(--main);margin:0;padding:0}
    .car-select-wrap{text-align:center}.app-title{font-size:12px;color:var(--muted);line-height:1;margin-bottom:4px}
    #topCar{width:100%;max-width:260px;text-align:center;text-align-last:center;border:0;border-radius:14px;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.06);font-weight:800;color:var(--text);padding:11px 12px}
    .view-title{font-size:26px;font-weight:800;text-align:center;margin:12px 0 8px}
    .card{background:var(--card);border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    h2{margin:0 0 12px;font-size:18px} h3{margin:0 0 10px;font-size:15px}
    label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px}
    input,select,textarea,button{width:100%;font-size:16px;border-radius:12px;border:1px solid var(--border);padding:12px;background:white;font-family:inherit}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#9ca3af;box-shadow:0 0 0 3px rgba(17,24,39,.08)}
    textarea{min-height:80px;resize:vertical}
    button{margin-top:14px;border:none;background:var(--main);color:white;font-weight:700;cursor:pointer}
    button:active{transform:scale(.99)}.secondary{background:#eef0f3;color:var(--text)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center}
    .summary-box{background:var(--soft);border-radius:14px;padding:12px;border:1px solid #eef0f3}
    .summary-num{font-size:22px;font-weight:800}.summary-label{color:var(--muted);font-size:12px;margin-top:4px}
    .hero{height:190px;border-radius:20px;background:linear-gradient(135deg,#111827,#374151);overflow:hidden;position:relative;box-shadow:0 10px 28px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;color:white}
    .hero img{width:100%;height:100%;object-fit:cover;display:block}.hero-empty{text-align:center;color:#e5e7eb;font-weight:800}.hero-empty small{display:block;color:#cbd5e1;font-weight:500;margin-top:6px}
    .next-box{background:var(--blue-soft);border:1px solid #bfdbfe;border-radius:14px;padding:12px;margin-top:14px}
    .next-title{font-weight:800;color:#1e3a8a;margin:0 0 8px;font-size:14px}.next-preview{color:#1d4ed8;margin:8px 0 0;font-size:14px;line-height:1.5}
    .record,.alert{border-top:1px solid var(--border);padding:14px 0}.record:first-child,.alert:first-child{border-top:none}
    .record-title{font-weight:700;font-size:16px;margin-bottom:6px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
    .record-meta{color:var(--muted);font-size:14px;line-height:1.65}.record-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .badge{display:inline-block;font-size:12px;font-weight:800;border-radius:999px;padding:4px 9px;background:#e5e7eb;color:#374151}
    .ok{background:var(--green-soft);color:var(--green)}.warn{background:var(--warn-soft);color:var(--warn)}.danger{background:var(--danger-soft);color:#991b1b}
    .delete-btn{background:transparent;color:var(--danger);border:1px solid #fecaca;margin-top:10px;padding:9px;font-size:14px}
    .edit-btn{background:#eef0f3;color:var(--text);margin-top:10px;padding:9px;font-size:14px}
    .empty{color:var(--muted);text-align:center;padding:20px 0}.tools{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .import{width:100%;border-radius:12px;border:none;padding:12px;background:#eef0f3;color:var(--text);font-weight:700;cursor:pointer;text-align:center;font-size:16px;margin:14px 0 0}.import input{display:none}
    .settings-item{border-top:1px solid var(--border);padding:14px 0}.settings-item:first-child{border-top:none}.settings-name{font-weight:800}.settings-meta{color:var(--muted);font-size:13px;margin-top:4px}
    .side-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40;opacity:0;pointer-events:none;transition:.18s}.side-backdrop.open{opacity:1;pointer-events:auto}
    .drawer{position:fixed;top:0;bottom:0;left:0;width:min(310px,84vw);background:#fff;z-index:50;transform:translateX(-105%);transition:.2s;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);box-shadow:14px 0 40px rgba(0,0,0,.16)}
    .drawer.open{transform:translateX(0)}.drawer-title{font-size:22px;font-weight:900;margin:18px 0 14px}
    .nav-btn{display:block;text-align:left;background:#fff;color:var(--text);border:1px solid var(--border);margin:8px 0;padding:13px;border-radius:14px;font-weight:800}
    .view{display:none}.view.active{display:block}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:60;display:none;padding:18px;overflow:auto}.modal-backdrop.open{display:block}
    .modal{background:#fff;border-radius:20px;padding:16px;margin:calc(env(safe-area-inset-top) + 10px) auto 30px;max-width:760px;box-shadow:0 18px 50px rgba(0,0,0,.2)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px}.modal-title{font-size:20px;font-weight:900}.close-btn{width:42px;height:42px;border-radius:12px;background:#eef0f3;color:var(--text);font-size:22px;margin:0;padding:0}
    .chips{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px 0}.chip{background:#fff;color:var(--text);border:1px solid var(--border);margin:0;text-align:left}
    .chip.active{background:var(--main);color:white}
    .item-list{display:grid;gap:10px}.item-btn{background:#fff;color:var(--text);border:1px solid var(--border);text-align:left;margin:0}
    .photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.photo-card{background:var(--soft);border:1px solid #eef0f3;border-radius:14px;overflow:hidden}.photo-card img{width:100%;aspect-ratio:1.2/1;object-fit:cover;display:block}.photo-body{padding:10px}.photo-note{font-size:13px;color:var(--muted);line-height:1.5}.photo-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 10px 10px}.photo-actions button{margin:0;padding:9px;font-size:13px}
    .car-info{margin-top:10px;color:var(--muted);font-size:14px;line-height:1.6;text-align:center}.car-admin-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.car-admin-actions button{margin-top:10px}.danger-btn{background:var(--danger-soft);color:var(--danger)}
    
    .history-filter-box{background:var(--soft);border:1px solid #eef0f3;border-radius:16px;padding:12px;margin-bottom:12px}
    .history-filter-box label{margin-top:0}
    .history-count{color:var(--muted);font-size:14px;margin:10px 0 0}
    .history-group{border:1px solid var(--border);border-radius:16px;margin:10px 0;overflow:hidden;background:#fff}
    .history-group summary{list-style:none;padding:14px;font-weight:900;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
    .history-group summary::-webkit-details-marker{display:none}
    .history-group summary::after{content:"⌄";font-size:18px;color:var(--muted)}
    .history-group[open] summary::after{content:"⌃"}
    .history-group-body{padding:0 14px 4px}

    @media(max-width:620px){.row,.summary,.tools,.chips{grid-template-columns:1fr}.view-title{font-size:24px}.hero{height:165px}.photo-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="side-backdrop" id="sideBackdrop" onclick="closeMenu()"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-title">整備記録</div>
    <button class="nav-btn" onclick="showView('home')">ホーム</button>
    <button class="nav-btn" onclick="showView('history')">整備履歴</button>
    <button class="nav-btn" onclick="showView('alerts')">交換時期チェック</button>
    <button class="nav-btn" onclick="showView('album')">📸 アルバム</button>
    <button class="nav-btn" onclick="showView('settings')">設定</button>
    <button class="nav-btn" onclick="showView('backup')">バックアップ</button>
  </aside>

  <header class="topbar">
    <button class="icon-btn" onclick="openMenu()">☰</button>
    <div class="car-select-wrap">
      <div class="app-title">整備記録</div>
      <select id="topCar"></select>
    </div>
    <button class="icon-btn" onclick="openRecordModal()">＋</button>
  </header>

  <main>
    <section id="view-home" class="view active">
      <div class="view-title" id="homeTitle">ホーム</div>
      <div class="hero" id="heroPhoto"></div>
      <div class="car-info" id="homeCarInfo"></div>
      <section class="card">
        <h2>状態</h2>
        <div class="summary">
          <div class="summary-box"><div class="summary-num" id="currentKm">0</div><div class="summary-label">現在距離 km</div></div>
          <div class="summary-box"><div class="summary-num" id="dueCount">0</div><div class="summary-label">要確認</div></div>
        </div>
      </section>
      <section class="card"><h2>要確認項目</h2><div id="homeAlerts"></div></section>
      <section class="card"><h2>最近の整備履歴</h2><div id="recentRecords"></div></section>
    </section>

    <section id="view-history" class="view">
      <div class="view-title">整備履歴</div>
      <section class="card">
        <div class="history-filter-box">
          <label>分類</label>
          <select id="historyCategorySelect">
            <option value="全て見る">全て見る</option>
            <option value="交換">交換</option>
            <option value="調整">調整</option>
            <option value="清掃">清掃</option>
          </select>

          <label>項目</label>
          <select id="historyItemSelect">
            <option value="">全て見る</option>
          </select>

          <div class="history-count" id="historyCount">該当履歴：0件</div>
        </div>
        <input id="search" placeholder="検索：オイル、ブレーキ、345852 など" />
        <div id="records"></div>
      </section>
    </section>

    <section id="view-alerts" class="view">
      <div class="view-title">交換時期チェック</div>
      <section class="card"><label>現在の走行距離 km</label><input type="number" id="nowKm" inputmode="numeric" /><div id="alerts"></div></section>
    </section>

    <section id="view-album" class="view">
      <div class="view-title">アルバム</div>
      <section class="card">
        <h2 id="albumTitle">写真</h2>
        <button onclick="openPhotoModal()">写真を追加</button>
        <div id="photoGrid" class="photo-grid"></div>
      </section>
    </section>

    <section id="view-settings" class="view">
      <div class="view-title">設定</div>
      <section class="card">
        <h2>車両管理</h2>
        <button onclick="openCarModal()">＋ 車両追加</button>
        <div id="carSettings"></div>
      </section>
      <section class="card">
        <h2>交換推奨時期</h2>
        <p class="record-meta">交換項目だけが要確認に表示されます。</p>
        <div id="settingsList"></div>
        <button onclick="saveSettings()">設定を保存</button>
      </section>

      <section class="card">
        <h2>データバックアップ</h2>
        <p class="record-meta">車両情報・整備履歴・写真・交換推奨設定をJSONファイルとして保存できます。</p>
        <div class="tools">
          <button class="secondary" onclick="exportBackup()">バックアップを書き出し</button>
          <label class="import">バックアップを復元<input id="importFileSettings" type="file" accept="application/json" /></label>
        </div>
      </section>
    </section>

    <section id="view-backup" class="view">
      <div class="view-title">バックアップ</div>
      <section class="card">
        <h2>データ管理</h2>
        <div class="tools">
          <button class="secondary" onclick="exportBackup()">バックアップを書き出し</button>
          <label class="import">バックアップを復元<input id="importFile" type="file" accept="application/json" /></label>
        </div>
        <button class="secondary" onclick="resetSeed()">初期履歴に戻す</button>
      </section>
      <section class="card"><h2>iPhoneでアプリ化</h2><div class="record-meta">Safariで開く → 共有ボタン → 「ホーム画面に追加」でPWAとして使えます。</div></section>
    </section>
  </main>

  <div class="modal-backdrop" id="recordModal">
    <div class="modal">
      <div class="modal-head"><div class="modal-title" id="recordModalTitle">記録を追加</div><button class="close-btn" onclick="closeRecordModal()">×</button></div>
      <input type="hidden" id="editId" />
      <label>車両</label><select id="car"></select>
      <div class="row"><div><label>日付</label><input type="date" id="date" /></div><div><label>走行距離 km</label><input type="number" id="km" inputmode="numeric" placeholder="305134" /></div></div>
      <label>分類</label><select id="category"><option>交換</option><option>調整</option><option>清掃</option></select>
      <label>内容</label><select id="work"></select>
      <div class="row"><div><label>距離サイクル km</label><input type="number" id="cycleKm" inputmode="numeric" /></div><div><label>期間サイクル 月</label><input type="number" id="cycleMonth" inputmode="numeric" /></div></div>
      <div class="next-box"><p class="next-title">次回目安 自動計算</p><p class="next-preview" id="nextPreview">分類・内容・距離・日付から自動計算します。</p></div>
      <label>メモ</label><textarea id="memo" placeholder="部品名、粘度、気になった症状など"></textarea>
      <button onclick="saveRecordFromModal()">保存する</button>
    </div>
  </div>

  <div class="modal-backdrop" id="photoModal">
    <div class="modal">
      <div class="modal-head"><div class="modal-title">写真を追加</div><button class="close-btn" onclick="closePhotoModal()">×</button></div>
      <label>写真</label><input type="file" id="photoInput" accept="image/*" />
      <label>メモ</label><textarea id="photoNote" placeholder="例：ドラシャブーツ破れ、部品品番、作業前など"></textarea>
      <button onclick="savePhoto()">保存する</button>
    </div>
  </div>


  <div class="modal-backdrop" id="carModal">
    <div class="modal">
      <div class="modal-head"><div class="modal-title" id="carModalTitle">車両追加</div><button class="close-btn" onclick="closeCarModal()">×</button></div>
      <input type="hidden" id="editCarOriginalName" />

      <label>車両名</label>
      <input type="text" id="carNameInput" placeholder="例：GK5 フィット" />

      <label>型式</label>
      <input type="text" id="carModelInput" placeholder="例：DBA-GK5" />

      <label>ナンバー</label>
      <input type="text" id="carNumberInput" placeholder="例：相模 530 あ 1234" />

      <label>購入日</label>
      <input type="date" id="carPurchaseInput" />

      <label>現在距離 km</label>
      <input type="number" id="carMileageInput" inputmode="numeric" placeholder="例：348102" />

      <label>メモ</label>
      <textarea id="carMemoInput" placeholder="仕様、グレード、注意点など"></textarea>

      <button onclick="saveCarFromModal()">保存する</button>
    </div>
  </div>

  <input type="file" id="mainPhotoInput" accept="image/*" style="display:none" />

  <script src="seed-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
